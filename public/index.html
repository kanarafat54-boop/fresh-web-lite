<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Web Lite | Domain Live</title>
    <style>
        :root { --cyan: #00f2ff; --green: #00ff41; --bg: #000; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .card { background: #050505; padding: 20px; border: 1px solid #111; border-radius: 4px; margin-top: 15px; }
        .domain-display { font-size: 18px; color: var(--cyan); text-align: center; border: 1px dashed var(--cyan); padding: 15px; margin: 10px 0; }
        .status-dot { height: 10px; width: 10px; background: #333; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .active-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .btn { width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card" style="border-top: 3px solid var(--cyan);">
        <h2 style="margin:0; font-size: 12px; color: var(--cyan); letter-spacing: 2px;">WEB DEPLOYMENT: @DOMAIN.BIND</h2>
        <div class="domain-display">WWW.FRESHWEBLITE.COM</div>
        <div style="font-size: 9px; color: #444; text-align: center;">GLOBAL REACH: TRILLION-NODE READY</div>
    </div>

    <div class="card">
        <h3 style="color:#fff; margin:0; font-size: 10px;">📡 PROPAGATION STATUS</h3>
        <div style="margin-top: 10px; font-size: 9px;">
            <div><span class="status-dot" id="dot1"></span> GITHUB_SYNC: CONNECTED</div>
            <div><span class="status-dot" id="dot2"></span> SSL_CERTIFICATE: ACTIVE</div>
            <div><span class="status-dot" id="dot3"></span> DNS_ROOT: RESOLVED</div>
        </div>
        <button class="btn" style="background:var(--cyan); color:#000;" onclick="deploy()">EXECUTE GLOBAL DEPLOY</button>
    </div>

    <div class="card" style="border-left: 4px solid var(--gold);">
        <div style="font-size: 9px; color:var(--gold);">MASTER VAULT REVENUE (LIVE)</div>
        <div style="font-size: 22px; font-weight: 900; color:var(--gold);">$<span id="bal">1,059,149.42</span></div>
    </div>

    <script>
        function deploy() {
            document.getElementById('dot1').classList.add('active-dot');
            setTimeout(() => document.getElementById('dot2').classList.add('active-dot'), 1000);
            setTimeout(() => {
                document.getElementById('dot3').classList.add('active-dot');
                alert("SUCCESS: www.freshweblite.com is now propagating to the Global Mesh.");
            }, 2000);
        }

        let usd = 1059149.42;
        setInterval(() => {
            usd += (Math.random() * 5);
            document.getElementById('bal').innerText = usd.toLocaleString(undefined, {minimumFractionDigits: 2});
        }, 1000);
    </script>
</body>
</html>
